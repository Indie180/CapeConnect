<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Golden Arrow Admin - Wallets</title>
  <link rel="stylesheet" href="../admin-common/ga-theme.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">Golden Arrow <small>Admin Centre</small></div>
      <div class="demo-banner">Demo mode: localStorage only - not secure.</div>
      <div class="nav-list" style="margin-top:14px;">
        <a data-page="dashboard" href="dashboard.html">Dashboard</a>
        <a data-page="timetables" href="timetables.html">Timetables</a>
        <a data-page="prices" href="prices.html">Prices</a>
        <a data-page="users" href="users.html">Users</a>
        <a data-page="tickets" href="tickets.html">Tickets</a>
        <a data-page="wallets" href="wallets.html">Wallets</a>
        <a data-page="audit" href="audit.html">Audit</a>
        <a data-page="settings" href="settings.html">Settings</a>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="topbar-left"><input id="global-search" class="input search" placeholder="Search wallets..." /></div>
        <div class="topbar-right"><span id="admin-email" class="tag"></span><button id="logout-btn" class="btn btn-secondary">Logout</button></div>
      </div>
      <h1 id="page-title">Wallets</h1>

      <section class="card">
        <div class="grid two">
          <div><label>User ID</label><input id="adj-user" class="input" /></div>
          <div><label>Type</label><select id="adj-type"><option>TOPUP</option><option>DEDUCT</option></select></div>
          <div><label>Amount</label><input id="adj-amount" class="input" type="number" step="0.01" min="0" /></div>
          <div><label>Reason (required)</label><input id="adj-note" class="input" /></div>
        </div>
        <div class="row-actions" style="margin-top:10px;"><button id="adj-apply" class="btn btn-primary">Apply Adjustment</button></div>
      </section>

      <section class="card" style="margin-top:14px;">
        <div class="table-wrap">
          <table>
            <thead><tr><th>User ID</th><th>Balance</th><th>Transactions</th><th>Actions</th></tr></thead>
            <tbody id="wallet-body"></tbody>
          </table>
        </div>
      </section>

      <div id="wallet-modal" class="modal">
        <div class="modal-card">
          <div class="modal-head"><h3>Wallet Transactions</h3><button id="close-wallet-modal" class="btn btn-secondary">Close</button></div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>ID</th><th>Type</th><th>Amount</th><th>At</th><th>Ref Ticket</th><th>Note</th></tr></thead>
              <tbody id="wallet-tx-body"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
  <script src="../admin-common/ga-app.js"></script>
  <script>
    (async function () {
      GAAdmin.requireAuth();
      await GAAdmin.initRemote(false);
      GAAdmin.applyLayout('wallets', 'Golden Arrow Wallets');

      const modal = document.getElementById('wallet-modal');
      document.getElementById('close-wallet-modal').onclick = function () { modal.classList.remove('open'); };

      function openTx(wallet) {
        const body = document.getElementById('wallet-tx-body');
        body.innerHTML = '';
        (wallet.transactions || []).forEach((tx) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${tx.id}</td><td>${tx.type}</td><td>${GAAdmin.fmtCurrency(tx.amount)}</td><td>${GAAdmin.formatDateTime(tx.at)}</td><td>${tx.refTicketId || '-'}</td><td>${tx.note || '-'}</td>`;
          body.appendChild(tr);
        });
        modal.classList.add('open');
      }

      function render() {
        const body = document.getElementById('wallet-body');
        const wallets = GAAdmin.getWallets();
        body.innerHTML = '';
        wallets.forEach((w) => {
          const tr = document.createElement('tr');
          tr.setAttribute('data-searchable', 'true');
          tr.innerHTML = `
            <td>${w.userId}</td>
            <td>${GAAdmin.fmtCurrency(w.balance)}</td>
            <td>${(w.transactions || []).length}</td>
            <td><button class="btn btn-secondary" data-a="view">View Transactions</button></td>
          `;
          tr.querySelector('[data-a="view"]').onclick = function () { openTx(w); };
          body.appendChild(tr);
        });
      }

      document.getElementById('adj-apply').onclick = function () {
        const userId = document.getElementById('adj-user').value.trim();
        const type = document.getElementById('adj-type').value;
        const amount = Number(document.getElementById('adj-amount').value);
        const note = document.getElementById('adj-note').value.trim();
        if (!userId || !Number.isFinite(amount) || amount <= 0 || !note) return alert('All fields are required.');

        const wallets = GAAdmin.getWallets();
        let wallet = wallets.find((x) => x.userId === userId);
        if (!wallet) {
          wallet = { userId, balance: 0, currency: 'ZAR', transactions: [] };
          wallets.push(wallet);
        }

        const before = JSON.parse(JSON.stringify(wallet));
        wallet.balance = Number(wallet.balance || 0) + (type === 'TOPUP' ? amount : -amount);
        wallet.transactions.unshift({ id: GAAdmin.uid('tx'), type, amount, at: GAAdmin.nowIso(), refTicketId: '', note });
        GAAdmin.saveWallets(wallets);
        GAAdmin.logAudit('WALLET_ADJUST', 'WALLET', userId, before, wallet);
        render();
      };

      render();
    })();
  </script>
</body>
</html>
