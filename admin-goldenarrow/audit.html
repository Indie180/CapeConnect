<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Golden Arrow Admin - Audit</title>
  <link rel="stylesheet" href="../admin-common/ga-theme.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">Golden Arrow <small>Admin Centre</small></div>
      <div class="demo-banner">Demo mode: localStorage only - not secure.</div>
      <div class="nav-list" style="margin-top:14px;">
        <a data-page="dashboard" href="dashboard.html">Dashboard</a>
        <a data-page="timetables" href="timetables.html">Timetables</a>
        <a data-page="prices" href="prices.html">Prices</a>
        <a data-page="users" href="users.html">Users</a>
        <a data-page="tickets" href="tickets.html">Tickets</a>
        <a data-page="wallets" href="wallets.html">Wallets</a>
        <a data-page="audit" href="audit.html">Audit</a>
        <a data-page="settings" href="settings.html">Settings</a>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="topbar-left"><input id="global-search" class="input search" placeholder="Search logs..." /></div>
        <div class="topbar-right"><span id="admin-email" class="tag"></span><button id="logout-btn" class="btn btn-secondary">Logout</button></div>
      </div>
      <h1 id="page-title">Audit Logs</h1>

      <section class="card">
        <div class="grid two">
          <div><label>Action</label><input id="f-action" class="input" /></div>
          <div><label>Admin Email</label><input id="f-admin" class="input" /></div>
          <div><label>Date From</label><input id="f-from" class="input" type="date" /></div>
          <div><label>Date To</label><input id="f-to" class="input" type="date" /></div>
        </div>
        <div class="row-actions" style="margin-top:10px;">
          <button id="apply" class="btn btn-primary">Apply</button>
          <button id="exp" class="btn btn-secondary">Export CSV</button>
        </div>
      </section>

      <section class="card" style="margin-top:14px;">
        <div class="table-wrap">
          <table>
            <thead><tr><th>At</th><th>Admin</th><th>Action</th><th>Target</th><th>ID</th><th>Details</th></tr></thead>
            <tbody id="audit-body"></tbody>
          </table>
        </div>
      </section>

      <div id="audit-modal" class="modal">
        <div class="modal-card">
          <div class="modal-head"><h3>Before / After</h3><button id="close-audit-modal" class="btn btn-secondary">Close</button></div>
          <pre id="audit-detail" style="white-space:pre-wrap;background:#101010;border:1px solid #2b2b2b;padding:10px;border-radius:10px;"></pre>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
  <script src="../admin-common/ga-app.js"></script>
  <script src="../admin-common/export.js"></script>
  <script>
    (async function () {
      GAAdmin.requireAuth();
      await GAAdmin.initRemote(false);
      GAAdmin.applyLayout('audit', 'Golden Arrow Audit');

      let current = [];
      const modal = document.getElementById('audit-modal');
      document.getElementById('close-audit-modal').onclick = function () { modal.classList.remove('open'); };

      function passDate(iso, from, to) {
        if (!from && !to) return true;
        const d = new Date(iso);
        if (from && d < new Date(from)) return false;
        if (to) {
          const x = new Date(to);
          x.setHours(23, 59, 59, 999);
          if (d > x) return false;
        }
        return true;
      }

      function filter() {
        const fAction = document.getElementById('f-action').value.toLowerCase();
        const fAdmin = document.getElementById('f-admin').value.toLowerCase();
        const fFrom = document.getElementById('f-from').value;
        const fTo = document.getElementById('f-to').value;

        return GAAdmin.getAudit().filter((l) => {
          if (fAction && !String(l.action).toLowerCase().includes(fAction)) return false;
          if (fAdmin && !String(l.adminEmail).toLowerCase().includes(fAdmin)) return false;
          if (!passDate(l.at, fFrom, fTo)) return false;
          return true;
        });
      }

      function render() {
        current = filter();
        const body = document.getElementById('audit-body');
        body.innerHTML = '';
        current.forEach((l) => {
          const tr = document.createElement('tr');
          tr.setAttribute('data-searchable', 'true');
          tr.innerHTML = `
            <td>${GAAdmin.formatDateTime(l.at)}</td>
            <td>${l.adminEmail}</td>
            <td>${l.action}</td>
            <td>${l.targetType}</td>
            <td>${l.targetId}</td>
            <td><button class="btn btn-secondary" data-a="view">View</button></td>
          `;
          tr.querySelector('[data-a="view"]').onclick = function () {
            document.getElementById('audit-detail').textContent = JSON.stringify({ before: l.before, after: l.after }, null, 2);
            modal.classList.add('open');
          };
          body.appendChild(tr);
        });
      }

      document.getElementById('apply').onclick = render;
      document.getElementById('exp').onclick = function () {
        GAExport.exportCsv('ga-audit.csv', current);
        GAAdmin.logAudit('EXPORT_AUDIT_CSV', 'AUDIT', 'list', null, { rows: current.length });
      };

      render();
    })();
  </script>
</body>
</html>
