<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Golden Arrow Admin - Users</title>
  <link rel="stylesheet" href="../admin-common/ga-theme.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">Golden Arrow <small>Admin Centre</small></div>
      <div class="demo-banner">Demo mode: localStorage only - not secure.</div>
      <div class="nav-list" style="margin-top:14px;">
        <a data-page="dashboard" href="dashboard.html">Dashboard</a>
        <a data-page="timetables" href="timetables.html">Timetables</a>
        <a data-page="prices" href="prices.html">Prices</a>
        <a data-page="users" href="users.html">Users</a>
        <a data-page="tickets" href="tickets.html">Tickets</a>
        <a data-page="wallets" href="wallets.html">Wallets</a>
        <a data-page="audit" href="audit.html">Audit</a>
        <a data-page="settings" href="settings.html">Settings</a>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="topbar-left"><input id="global-search" class="input search" placeholder="Search users..." /></div>
        <div class="topbar-right"><span id="admin-email" class="tag"></span><button id="logout-btn" class="btn btn-secondary">Logout</button></div>
      </div>
      <h1 id="page-title">Users</h1>

      <section class="card">
        <div class="table-wrap">
          <table>
            <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="user-body"></tbody>
          </table>
        </div>
      </section>

      <div id="user-modal" class="modal">
        <div class="modal-card">
          <div class="modal-head"><h3>User Details</h3><button id="close-user-modal" class="btn btn-secondary">Close</button></div>
          <div id="user-modal-content"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
  <script src="../admin-common/ga-app.js"></script>
  <script src="../admin-common/export.js"></script>
  <script>
    (async function () {
      GAAdmin.requireAuth();
      await GAAdmin.initRemote(false);
      GAAdmin.applyLayout('users', 'Golden Arrow Users');

      const modal = document.getElementById('user-modal');
      const modalContent = document.getElementById('user-modal-content');
      document.getElementById('close-user-modal').onclick = function () { modal.classList.remove('open'); };

      function saveAndRender(users, action, targetId, before, after) {
        GAAdmin.saveUsers(users);
        GAAdmin.logAudit(action, 'USER', targetId, before, after);
        render();
      }

      function setStatus(user, status) {
        const users = GAAdmin.getUsers();
        const i = users.findIndex((u) => u.id === user.id);
        if (i < 0) return;
        const before = { ...users[i] };
        users[i].status = status;
        users[i].updatedAt = GAAdmin.nowIso();
        if (status === 'BLACKLISTED') {
          const reason = prompt('Blacklist reason (required):');
          if (!reason) return;
          const until = prompt('Blacklist until date (optional YYYY-MM-DD):', '');
          users[i].blacklistReason = reason;
          users[i].blacklistUntil = until || '';
        }
        if (status !== 'BLACKLISTED') {
          users[i].blacklistReason = '';
          users[i].blacklistUntil = '';
        }
        saveAndRender(users, `USER_${status}`, user.id, before, users[i]);
      }

      function userTickets(userId) {
        return GAAdmin.getTickets().filter((t) => t.userId === userId).slice(0, 5);
      }

      function openDetails(user) {
        const wallets = GAAdmin.getWallets();
        const wallet = wallets.find((w) => w.userId === user.id);
        const tickets = userTickets(user.id);

        modalContent.innerHTML = `
          <p><strong>Status:</strong> ${user.status}</p>
          <p><strong>Wallet:</strong> ${GAAdmin.fmtCurrency(wallet?.balance || 0)}</p>
          <h4>Last 5 tickets</h4>
          <div class="table-wrap">
            <table>
              <thead><tr><th>ID</th><th>Product</th><th>Route</th><th>Amount</th><th>Status</th></tr></thead>
              <tbody>
                ${tickets.map((t) => `<tr><td>${t.id}</td><td>${t.productName}</td><td>${t.routeFrom} -> ${t.routeTo}</td><td>${GAAdmin.fmtCurrency(t.amount)}</td><td>${t.status}</td></tr>`).join('') || '<tr><td colspan="5">No tickets</td></tr>'}
              </tbody>
            </table>
          </div>
          <div class="row-actions" style="margin-top:10px;">
            <button id="exp-user-xlsx" class="btn btn-primary">Export User History XLSX</button>
            <button id="exp-user-pdf" class="btn btn-secondary">Export User History PDF</button>
          </div>
        `;

        document.getElementById('exp-user-xlsx').onclick = function () {
          const rows = GAAdmin.getTickets().filter((t) => t.userId === user.id).map((t) => ({
            ticketId: t.id, product: t.productName, routeFrom: t.routeFrom, routeTo: t.routeTo,
            amount: t.amount, status: t.status, purchasedAt: t.purchasedAt
          }));
          GAExport.exportXlsx(`user_${user.id}_tickets.xlsx`, rows, 'Tickets');
          GAAdmin.logAudit('USER_EXPORT_XLSX', 'USER', user.id, null, { rows: rows.length });
        };

        document.getElementById('exp-user-pdf').onclick = function () {
          const rows = GAAdmin.getTickets().filter((t) => t.userId === user.id)
            .map((t) => [t.id, t.productName, `${t.routeFrom} -> ${t.routeTo}`, GAAdmin.fmtCurrency(t.amount), t.status, t.purchasedAt]);
          GAExport.exportPdfTable(`user_${user.id}_tickets.pdf`, ['Ticket', 'Product', 'Route', 'Amount', 'Status', 'Purchased'], rows, 'User Ticket History');
          GAAdmin.logAudit('USER_EXPORT_PDF', 'USER', user.id, null, { rows: rows.length });
        };

        modal.classList.add('open');
      }

      function render() {
        const body = document.getElementById('user-body');
        const users = GAAdmin.getUsers();
        body.innerHTML = '';
        users.forEach((u) => {
          const tr = document.createElement('tr');
          tr.setAttribute('data-searchable', 'true');
          tr.innerHTML = `
            <td>${u.id}</td><td>${u.fullName}</td><td>${u.email}</td><td>${u.phone}</td><td>${u.status}</td>
            <td>
              <div class="row-actions">
                <button class="btn btn-secondary" data-a="details">Details</button>
                <button class="btn btn-secondary" data-a="active">Activate</button>
                <button class="btn btn-secondary" data-a="deactivate">Deactivate</button>
                <button class="btn btn-secondary" data-a="blacklist">Blacklist</button>
                <button class="btn btn-secondary" data-a="unblacklist">Unblacklist</button>
                <button class="btn btn-danger" data-a="delete">Soft Delete</button>
              </div>
            </td>
          `;

          tr.querySelector('[data-a="details"]').onclick = function () { openDetails(u); };
          tr.querySelector('[data-a="active"]').onclick = function () { setStatus(u, 'ACTIVE'); };
          tr.querySelector('[data-a="deactivate"]').onclick = function () { setStatus(u, 'DEACTIVATED'); };
          tr.querySelector('[data-a="blacklist"]').onclick = function () { setStatus(u, 'BLACKLISTED'); };
          tr.querySelector('[data-a="unblacklist"]').onclick = function () { setStatus(u, 'ACTIVE'); };
          tr.querySelector('[data-a="delete"]').onclick = function () { setStatus(u, 'DELETED'); };

          body.appendChild(tr);
        });
      }

      render();
    })();
  </script>
</body>
</html>
