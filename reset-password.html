<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="pictures/ChatGPT Image Feb 5, 2026, 10_08_28 AM.png">
    <title>Set New Password - CapeConnect</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page forgot-page">
    <main class="main-content">
        <div class="card">
            <h2 class="card-title">Set New Password</h2>
            <p class="text-center" style="color: var(--text-muted); margin-bottom: 25px;">Choose a new password for your account.</p>
            <form id="reset-password-form">
                <div class="form-group">
                    <label for="new-password">New Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="new-password" placeholder="Enter new password" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="confirm-password" placeholder="Confirm new password" required>
                    </div>
                    <p id="reset-error" class="inline-error hidden" role="alert" aria-live="polite"></p>
                    <p id="reset-success" class="inline-success hidden"></p>
                </div>
                <button type="submit" class="btn-primary">Reset Password</button>
                <div class="auth-links" style="justify-content: center;">
                    <a href="login.html">Back to Login</a>
                </div>
            </form>
        </div>
    </main>

    <script src="js/api-client.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const token = String(params.get('token') || '').trim();
        const form = document.getElementById('reset-password-form');
        const resetError = document.getElementById('reset-error');
        const resetSuccess = document.getElementById('reset-success');

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            resetError.classList.add('hidden');
            resetSuccess.classList.add('hidden');

            const newPassword = String(document.getElementById('new-password').value || '');
            const confirmPassword = String(document.getElementById('confirm-password').value || '');

            if (!token) {
                resetError.textContent = 'Reset token is missing.';
                resetError.classList.remove('hidden');
                return;
            }
            if (newPassword.length < 8) {
                resetError.textContent = 'Password must be at least 8 characters.';
                resetError.classList.remove('hidden');
                return;
            }
            if (newPassword !== confirmPassword) {
                resetError.textContent = 'Passwords do not match.';
                resetError.classList.remove('hidden');
                return;
            }

            try {
                await window.CCApi.resetPassword({ token, newPassword });
                resetSuccess.textContent = 'Password reset successfully. You can log in now.';
                resetSuccess.classList.remove('hidden');
                form.reset();
            } catch (error) {
                resetError.textContent = error?.message || 'Could not reset password.';
                resetError.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
