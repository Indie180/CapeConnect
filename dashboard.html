<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting to Dashboard</title>
</head>
<body>
  <p>Redirecting to your dashboard...</p>
  <script>
    (function () {
      const raw = String(localStorage.getItem("selectedBus") || "").toLowerCase().trim();
      const bus = raw === "ga" || raw === "golden-arrow" || raw === "goldenarrow" ? "ga" : "myciti";
      const target = bus === "ga" ? "golden-arrow-dashboard.html" : "myciti-dashboard.html";
      window.location.replace(target);
    })();
  </script>
</body>
</html>
