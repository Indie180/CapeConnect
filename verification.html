<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification - CapeConnect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header>
        <div class="nav-container">
            <button class="back-btn"><i class="fas fa-arrow-left"></i> Back</button>
            <a href="index.html" class="logo"><i class="fas fa-bus"></i> CapeConnect</a>
            <div class="nav-btns">
                <button class="theme-toggle" aria-label="Toggle theme" onclick="App.toggleTheme()" title="Toggle Theme">
                    <i class="fas fa-cog"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="card" style="max-width: 500px; margin-top: 50px;">
            <!-- Mock Email (for demo only) -->
            <div id="mock-email" class="card"
                style="background: var(--bg-main); border: 1px dashed var(--ga-yellow); margin-bottom: 30px; text-align: left;">
                <p style="color: var(--ga-yellow); font-size: 0.8rem; margin-bottom: 5px;">[DEBUG] Mock Email Incoming:
                </p>
                <p style="font-size: 0.9rem;">To: <span id="mock-to">-</span></p>
                <p style="font-size: 0.9rem; margin-top: 5px;">Subject: CapeConnect Verification</p>
                <p
                    style="font-size: 1.1rem; font-weight: 700; margin-top: 10px; padding: 10px; background: rgba(255,255,255,0.05); text-align: center; border-radius: 5px; color: var(--myciti-blue);">
                    Verification Code: <span id="mock-code">123456</span>
                </p>
            </div>

            <div style="text-align: center; margin-bottom: 30px;">
                <i class="fas fa-envelope-open-text"
                    style="font-size: 3rem; color: var(--myciti-blue); margin-bottom: 20px;"></i>
                <h1 class="card-title">Verify Your Account</h1>
                <p style="color: var(--text-muted);">Enter the 6-digit code sent to your email or phone to complete your
                    registration.</p>
            </div>

            <form onsubmit="event.preventDefault(); verifyCode();">
                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fas fa-key"></i>
                        <input type="text" id="verification-input" maxlength="6" placeholder="000000"
                            style="text-align: center; letter-spacing: 5px; font-size: 1.5rem; font-weight: 700;">
                    </div>
                    <p class="error-msg" id="verify-error">Invalid verification code. Please try again.</p>
                </div>

                <button type="submit" class="btn-primary">Verify & Continue</button>

                <p style="text-align: center; margin-top: 25px; font-size: 0.9rem; color: var(--text-muted);">
                    Didn't receive a code? <a href="#" onclick="resendCode()"
                        style="color: var(--myciti-blue); font-weight: 600;">Resend Code</a>
                </p>
            </form>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const email = params.get('email');
            const code = App.storage.get('verificationCode');

            if (email) document.getElementById('mock-to').textContent = email;
            if (code) document.getElementById('mock-code').textContent = code;

            // Redirect back if no code/email (likely unauthorized access)
            if (!code) {
                // window.location.href = 'signup.html';
            }
        });
    </script>
</body>

</html>
