<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CapeConnect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">
                <img class="logo-img" src="pictures/ChatGPT Image Feb 5, 2026, 10_08_28 AM.png" alt="CapeConnect logo">
                <span class="logo-text">CapeConnect</span>
            </a>
            <div class="nav-btns">
                <button class="theme-toggle" aria-label="Toggle theme" onclick="App.toggleTheme()" title="Toggle Light/Dark Mode">
                    <i class="fas fa-sun" aria-hidden="true"></i>
                </button>
                <a href="signup.html" class="header-btn btn-signup">Sign Up</a>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="app-brand">
            <img class="app-logo" src="pictures/ChatGPT Image Feb 5, 2026, 10_08_28 AM.png" alt="CapeConnect logo">
            <h1>CapeConnect</h1>
            <p class="slogan" style="margin-top:6px;color:var(--text-muted);font-weight:600;">Every Journey Connects</p>
        </div>

        <div class="card">
            <h2 class="card-title">Welcome Back</h2>
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">Email or Phone Number</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user-circle" aria-hidden="true"></i>
                        <input type="text" id="email" placeholder="Enter your email or phone" required>
                    </div>
                    <p id="email-error" class="inline-error hidden" role="alert" aria-live="polite">Please enter a valid email or 10-digit phone number.</p>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock" aria-hidden="true"></i>
                        <input type="password" id="password" placeholder="Enter your password" required>
                        <button type="button" class="pw-toggle" aria-label="Show password" data-toggle-password="password">Show</button>
                    </div>
                    <p id="password-error" class="inline-error hidden" role="alert" aria-live="polite">Invalid credentials. Check your details and try again.</p>
                </div>

                <button type="submit" class="btn-primary">Sign In</button>

                <div class="auth-links">
                    <a href="forgot-password.html">Forgot Password?</a>
                    <a href="signup.html">Create Account</a>
                </div>
            </form>
        </div>
    </main>

    <script src="js/api-client.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
