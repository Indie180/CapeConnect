<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="pictures/ChatGPT Image Feb 5, 2026, 10_08_28 AM.png">
    <title>Choose Your Service - CapeConnect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="page-choose">
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo"><i class="fas fa-bus" id="logo-icon" aria-hidden="true"></i> CapeConnect</a>
            <div class="nav-btns">
                <button class="header-btn btn-login" onclick="App.confirmLogout()">Logout</button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div style="text-align: center; margin-bottom: 40px;">
            <h1 class="hero-title" style="color: var(--text-main); font-size: 2.2rem; margin-bottom: 10px;">Select Your
                Preferred Service</h1>
            <p style="color: var(--text-muted);">Choose a bus service to continue to your personal dashboard.</p>
        </div>

            <div class="bus-options">
            <div class="bus-card ga" id="ga-card" role="button" tabindex="0" data-bus="ga">
                <div class="bus-icon">
                    <img src="pictures/Golden Arrow.webp" alt="Golden Arrow Logo"
                        style="width: 100%; height: 100%; object-fit: contain;">
                </div>
                <h3>Golden Arrow</h3>
                <p>Reliable metro-wide commuter service since 1861.</p>
                <div class="status-check"><i class="fas fa-check" aria-hidden="true"></i></div>
            </div>

            <div class="bus-card myciti" id="myciti-card" role="button" tabindex="0" data-bus="myciti">
                <div class="bus-icon">
                    <img src="pictures/myciti.jfif" alt="MyCiTi Logo"
                        style="width: 100%; height: 100%; object-fit: contain;">
                </div>
                <h3>MyCiTi</h3>
                <p>Rapid transit system with dedicated travel lanes.</p>
                <div class="status-check"><i class="fas fa-check" aria-hidden="true"></i></div>
            </div>
        </div>
    </main>

    <script src="js/api-client.js"></script>
    <script src="js/auth-pages.js"></script>
        <script>
            // Change header default to blue (page-specific quick override)
            (function(){
                function selectService(bus) {
                    const normalizedBus = String(bus || '').toLowerCase();
                    if (window.App && typeof App.selectBus === 'function') {
                        App.selectBus(normalizedBus);
                        return;
                    }
                    localStorage.setItem('selectedBus', normalizedBus);
                    window.location.href = normalizedBus === 'ga' ? 'golden-arrow-dashboard.html' : 'myciti-dashboard.html';
                }

                const hdr = document.querySelector('header');
                if(hdr) hdr.style.background = getComputedStyle(document.documentElement).getPropertyValue('--myciti-blue') || '#005DAA';

                document.querySelectorAll('.bus-card[role="button"]').forEach(card => {
                    card.addEventListener('click', () => {
                        const bus = card.getAttribute('data-bus');
                        if (!bus) return;
                        selectService(bus);
                    });
                    card.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter' || e.key === ' ') {
                            e.preventDefault();
                            const bus = card.getAttribute('data-bus');
                            if (!bus) return;
                            selectService(bus);
                        }
                    });
                });

                // Listen for clicks to visually update header before redirect
                document.getElementById('ga-card').addEventListener('click', ()=>{
                    const header = document.querySelector('header');
                    if(header) header.style.background = '#007A33';
                    const icon = document.getElementById('logo-icon');
                    if(icon) icon.className = '';
                    const logo = document.querySelector('.logo');
                    if(logo) logo.innerHTML = `<img class="logo-img" src="pictures/Golden_Arrow-removebg-preview.png" alt="Golden Arrow"><span class="logo-text">CapeConnect</span>`;
                });
                document.getElementById('myciti-card').addEventListener('click', ()=>{
                    const header = document.querySelector('header');
                    if(header) header.style.background = '#E2231A';
                    const logo = document.querySelector('.logo');
                    if(logo) logo.innerHTML = `<img class="logo-img" src="pictures/myciti-removebg-preview.png" alt="MyCiTi"><span class="logo-text">MyCiTi</span>`;
                });
            })();
        </script>
</body>

</html>
