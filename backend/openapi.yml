openapi: 3.0.3
info:
  title: CapeConnect API
  version: 1.0.0
  description: Transit ticketing and wallet management API for Cape Town operators

servers:
  - url: http://localhost:4000
    description: Development server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        role:
          type: string
          enum: [USER, ADMIN]
        operator:
          type: string
          enum: [MYCITI, GOLDEN_ARROW]

    Ticket:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        route_id:
          type: integer
        status:
          type: string
          enum: [PAID, USED, EXPIRED]
        price:
          type: number
        purchased_at:
          type: string
          format: date-time

    Wallet:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        balance:
          type: number
        operator:
          type: string

paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service is healthy

  /api/auth/login:
    post:
      summary: User login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'

  /api/auth/me:
    get:
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /api/tickets:
    get:
      summary: Get user tickets
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [PAID, USED, EXPIRED]
      responses:
        '200':
          description: List of tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ticket'

    post:
      summary: Purchase ticket
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [route_id, price]
              properties:
                route_id:
                  type: integer
                price:
                  type: number
      responses:
        '201':
          description: Ticket purchased
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'

  /api/wallets/me:
    get:
      summary: Get user wallet
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Wallet details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Wallet'
