<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="pictures/ChatGPT Image Feb 5, 2026, 10_08_28 AM.png">
    <title>Forgot Password - CapeConnect</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page forgot-page">
    <main class="main-content">
        <div class="card">
            <h2 class="card-title">Reset Password</h2>
            <p class="text-center" style="color: var(--text-muted); margin-bottom: 25px;">Enter your email address and we'll issue a reset link.</p>
            <form id="forgot-password-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>
                    <p id="email-error" class="inline-error hidden" role="alert" aria-live="polite">Please enter a valid email address.</p>
                </div>
                <p id="forgot-success" class="inline-success hidden" style="margin-bottom: 12px;"></p>
                <p id="forgot-reset-link" class="hidden" style="margin-bottom: 12px;"></p>
                <button type="submit" class="btn-primary">Send Reset Link</button>
                <div class="auth-links" style="justify-content: center;">
                    <a href="login.html">Back to Login</a>
                </div>
            </form>
        </div>
    </main>

    <script src="js/api-client.js"></script>
    <script>
        const form = document.getElementById('forgot-password-form');
        const emailInput = document.getElementById('email');
        const emailError = document.getElementById('email-error');
        const success = document.getElementById('forgot-success');
        const resetLink = document.getElementById('forgot-reset-link');

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            const email = String(emailInput.value || '').trim();
            const valid = /.+@.+\..+/.test(email);
            emailError.classList.toggle('hidden', valid);
            success.classList.add('hidden');
            resetLink.classList.add('hidden');
            resetLink.innerHTML = '';

            if (!valid) return;

            try {
                const data = await window.CCApi.forgotPassword({ email });
                success.textContent = data?.message || 'If an account exists, a reset link has been issued.';
                success.classList.remove('hidden');
                if (data?.resetUrl) {
                    resetLink.innerHTML = `<a href="${data.resetUrl}">Open reset page</a>`;
                    resetLink.classList.remove('hidden');
                }
            } catch (error) {
                emailError.textContent = error?.message || 'Could not start password reset.';
                emailError.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
