<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - CapeConnect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header>
        <div class="nav-container">
            <button class="back-btn"><i class="fas fa-arrow-left" aria-hidden="true"></i> Back</button>
            <a href="index.html" class="logo">
                <i class="fas fa-bus" aria-hidden="true"></i> CapeConnect
            </a>
            <div class="nav-links">
                <button class="theme-toggle" aria-label="Toggle theme" onclick="App.toggleTheme()" title="Toggle Light/Dark Mode">
                    <i class="fas fa-sun" aria-hidden="true"></i>
                </button>
            </div>
            <div class="nav-btns">
                <a href="login.html" class="header-btn btn-login">Login</a>
                <a href="signup.html" class="header-btn btn-signup">Sign Up</a>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="app-brand">
            <i class="fas fa-bus" aria-hidden="true"></i>
            <h1>CapeConnect</h1>
        </div>

        <div class="card">
            <h2 class="card-title">Reset Password</h2>
            <p class="text-center" style="color: var(--text-muted); margin-bottom: 25px;">Enter your email address and
                we'll send you a link to reset your password.</p>
            <form id="forgot-password-form" onsubmit="handleForgotPassword(event)">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user-circle" aria-hidden="true"></i>
                        <input type="text" id="email" placeholder="Enter your email" required>
                    </div>
                    <p id="email-error" class="inline-error hidden" role="alert" aria-live="polite">Please enter a valid email address.</p>
                </div>

                <button type="submit" class="btn-primary">Send Reset Link</button>

                <div class="auth-links" style="justify-content: center;">
                    <a href="login.html">Back to Login</a>
                </div>
            </form>
        </div>
    </main>

    <script src="js/app.js"></script>
</body>

</html>
