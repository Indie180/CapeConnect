<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting to Dashboard</title>
</head>
<body>
  <p>The booking flow has been updated. Redirecting you to the dashboard...</p>
  <script>
    (function () {
      const pathname = window.location.pathname.toLowerCase();
      const file = pathname.split("/").pop() || "";
      
      // Determine target operator from old filename
      let targetOperator = "myciti";
      if (file.startsWith("ga-")) {
        targetOperator = "ga";
      }
      
      const target = targetOperator === "ga"
        ? "golden-arrow-dashboard.html"
        : "myciti-dashboard.html";
      
      window.location.replace(target);
    })();
  </script>
</body>
</html>
