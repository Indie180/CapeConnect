<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyCiTi Admin - Timetables</title>
  <link rel="stylesheet" href="../admin-common/mc-theme.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">MyCiTi <small>Admin Centre</small></div>
      <div class="demo-banner">Demo mode: localStorage only - not secure.</div>
      <div class="nav-list" style="margin-top:14px;">
        <a data-page="dashboard" href="dashboard.html">Dashboard</a>
        <a data-page="timetables" href="timetables.html">Timetables</a>
        <a data-page="prices" href="prices.html">Prices</a>
        <a data-page="users" href="users.html">Users</a>
        <a data-page="tickets" href="tickets.html">Tickets</a>
        <a data-page="wallets" href="wallets.html">Wallets</a>
        <a data-page="audit" href="audit.html">Audit</a>
        <a data-page="settings" href="settings.html">Settings</a>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="topbar-left"><input id="global-search" class="input search" placeholder="Search timetable rows..." /></div>
        <div class="topbar-right"><span id="admin-email" class="tag"></span><button id="logout-btn" class="btn btn-secondary">Logout</button></div>
      </div>

      <h1 id="page-title">Timetables</h1>
      <p class="notice">For real security, use server-side auth + MFA + IP allowlist.</p>

      <section class="card">
        <div class="grid two">
          <div>
            <label>Route Name</label><input id="f-route" class="input" />
          </div>
          <div>
            <label>Route Code</label><input id="f-code" class="input" />
          </div>
          <div>
            <label>Direction</label><select id="f-direction"><option>Outbound</option><option>Inbound</option></select>
          </div>
          <div>
            <label>Day Type</label><select id="f-day"><option>Weekday</option><option>Saturday</option><option>Sunday</option></select>
          </div>
          <div>
            <label>Stops (one per line: Name|Code)</label><textarea id="f-stops" rows="5" placeholder="Cape Town|CT"></textarea>
          </div>
          <div>
            <label>Times (one per line HH:mm)</label><textarea id="f-times" rows="5" placeholder="06:30"></textarea>
          </div>
        </div>
        <div class="row-actions" style="margin-top:10px;">
          <button id="save-tt" class="btn btn-primary">Save Draft</button>
          <button id="reset-tt" class="btn btn-secondary">Clear</button>
        </div>
      </section>

      <section class="card" style="margin-top:14px;">
        <div class="grid two">
          <div><label>Filter Route</label><input id="filter-route" class="input" placeholder="Cape Town" /></div>
          <div><label>Filter Status</label><select id="filter-status"><option value="">All</option><option>DRAFT</option><option>PUBLISHED</option></select></div>
          <div><label>Filter Day</label><select id="filter-day"><option value="">All</option><option>Weekday</option><option>Saturday</option><option>Sunday</option></select></div>
        </div>
        <hr class="sep" />
        <div class="table-wrap">
          <table>
            <thead><tr><th>ID</th><th>Route</th><th>Direction</th><th>Day</th><th>Status</th><th>Times</th><th>Actions</th></tr></thead>
            <tbody id="tt-body"></tbody>
          </table>
        </div>
      </section>

      <div id="versions-modal" class="modal">
        <div class="modal-card">
          <div class="modal-head"><h3>Version History (last 5)</h3><button id="close-ver" class="btn btn-secondary">Close</button></div>
          <pre id="versions-content" style="white-space:pre-wrap;background:#101010;border:1px solid #2b2b2b;padding:10px;border-radius:10px;"></pre>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
  <script src="../admin-common/mc-app.js"></script>
  <script>
    (async function () {
      MCAdmin.requireAuth();
      await MCAdmin.initRemote(false);
      MCAdmin.applyLayout('timetables', 'MyCiTi Timetables');

      const form = {
        route: document.getElementById('f-route'), code: document.getElementById('f-code'),
        dir: document.getElementById('f-direction'), day: document.getElementById('f-day'),
        stops: document.getElementById('f-stops'), times: document.getElementById('f-times')
      };
      const state = { editId: null };

      function parseStops(raw) {
        return String(raw || '').split(/\r?\n/).map((s) => s.trim()).filter(Boolean).map((x) => {
          const [name, code] = x.split('|');
          return { name: (name || '').trim(), code: (code || '').trim() };
        });
      }

      function parseTimes(raw) {
        return String(raw || '').split(/\r?\n/).map((s) => s.trim()).filter(Boolean);
      }

      function resetForm() {
        state.editId = null;
        form.route.value = '';
        form.code.value = '';
        form.stops.value = '';
        form.times.value = '';
        form.dir.value = 'Outbound';
        form.day.value = 'Weekday';
      }

      function save() {
        const list = MCAdmin.getTimetables();
        const payload = {
          id: state.editId || MCAdmin.uid('tt'),
          routeName: form.route.value.trim(),
          routeCode: form.code.value.trim(),
          direction: form.dir.value,
          dayType: form.day.value,
          stops: parseStops(form.stops.value),
          times: parseTimes(form.times.value),
          status: 'DRAFT',
          effectiveFrom: MCAdmin.nowIso(),
          updatedAt: MCAdmin.nowIso(),
          deleted: false,
          versions: []
        };
        if (!payload.routeName || !payload.routeCode) {
          alert('Route name and code are required.');
          return;
        }

        const idx = list.findIndex((x) => x.id === payload.id);
        if (idx >= 0) {
          const before = list[idx];
          const versions = Array.isArray(before.versions) ? before.versions.slice(0, 4) : [];
          payload.status = before.status;
          payload.versions = [{ at: MCAdmin.nowIso(), snapshot: before }, ...versions];
          list[idx] = payload;
          MCAdmin.logAudit('TIMETABLE_UPDATE', 'TIMETABLE', payload.id, before, payload);
        } else {
          list.unshift(payload);
          MCAdmin.logAudit('TIMETABLE_CREATE', 'TIMETABLE', payload.id, null, payload);
        }
        MCAdmin.saveTimetables(list);
        resetForm();
        render();
      }

      function render() {
        const body = document.getElementById('tt-body');
        const fRoute = document.getElementById('filter-route').value.toLowerCase();
        const fStatus = document.getElementById('filter-status').value;
        const fDay = document.getElementById('filter-day').value;

        const list = MCAdmin.getTimetables().filter((x) => !x.deleted)
          .filter((x) => (fRoute ? `${x.routeName} ${x.routeCode}`.toLowerCase().includes(fRoute) : true))
          .filter((x) => (fStatus ? x.status === fStatus : true))
          .filter((x) => (fDay ? x.dayType === fDay : true));

        body.innerHTML = '';
        list.forEach((tt) => {
          const tr = document.createElement('tr');
          tr.setAttribute('data-searchable', 'true');
          tr.innerHTML = `
            <td>${tt.id}</td>
            <td>${tt.routeName} <br /><small>${tt.routeCode}</small></td>
            <td>${tt.direction}</td>
            <td>${tt.dayType}</td>
            <td><span class="tag ${tt.status === 'PUBLISHED' ? 'ok' : 'warn'}">${tt.status}</span></td>
            <td>${(tt.times || []).join(', ')}</td>
            <td>
              <div class="row-actions">
                <button class="btn btn-secondary" data-a="edit">Edit</button>
                <button class="btn btn-secondary" data-a="toggle">${tt.status === 'PUBLISHED' ? 'Unpublish' : 'Publish'}</button>
                <button class="btn btn-secondary" data-a="versions">Versions</button>
                <button class="btn btn-danger" data-a="delete">Soft Delete</button>
              </div>
            </td>
          `;

          tr.querySelector('[data-a="edit"]').onclick = function () {
            state.editId = tt.id;
            form.route.value = tt.routeName;
            form.code.value = tt.routeCode;
            form.dir.value = tt.direction;
            form.day.value = tt.dayType;
            form.stops.value = (tt.stops || []).map((s) => `${s.name}|${s.code}`).join('\n');
            form.times.value = (tt.times || []).join('\n');
          };

          tr.querySelector('[data-a="toggle"]').onclick = function () {
            const list2 = MCAdmin.getTimetables();
            const i = list2.findIndex((x) => x.id === tt.id);
            if (i < 0) return;
            const before = list2[i];
            list2[i] = { ...before, status: before.status === 'PUBLISHED' ? 'DRAFT' : 'PUBLISHED', updatedAt: MCAdmin.nowIso() };
            MCAdmin.saveTimetables(list2);
            MCAdmin.logAudit('TIMETABLE_TOGGLE', 'TIMETABLE', tt.id, before, list2[i]);
            render();
          };

          tr.querySelector('[data-a="versions"]').onclick = function () {
            document.getElementById('versions-modal').classList.add('open');
            document.getElementById('versions-content').textContent = JSON.stringify((tt.versions || []).slice(0, 5), null, 2) || 'No versions yet.';
          };

          tr.querySelector('[data-a="delete"]').onclick = function () {
            const list2 = MCAdmin.getTimetables();
            const i = list2.findIndex((x) => x.id === tt.id);
            if (i < 0) return;
            const before = list2[i];
            list2[i] = { ...before, deleted: true, updatedAt: MCAdmin.nowIso() };
            MCAdmin.saveTimetables(list2);
            MCAdmin.logAudit('TIMETABLE_SOFT_DELETE', 'TIMETABLE', tt.id, before, list2[i]);
            render();
          };

          body.appendChild(tr);
        });
      }

      document.getElementById('save-tt').onclick = save;
      document.getElementById('reset-tt').onclick = resetForm;
      document.getElementById('filter-route').addEventListener('input', render);
      document.getElementById('filter-status').addEventListener('change', render);
      document.getElementById('filter-day').addEventListener('change', render);
      document.getElementById('close-ver').onclick = function () { document.getElementById('versions-modal').classList.remove('open'); };

      render();
    })();
  </script>
</body>
</html>
