<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyCiTi Admin - Tickets</title>
  <link rel="stylesheet" href="../admin-common/mc-theme.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">MyCiTi <small>Admin Centre</small></div>
      <div class="demo-banner">Demo mode: localStorage only - not secure.</div>
      <div class="nav-list" style="margin-top:14px;">
        <a data-page="dashboard" href="dashboard.html">Dashboard</a>
        <a data-page="timetables" href="timetables.html">Timetables</a>
        <a data-page="prices" href="prices.html">Prices</a>
        <a data-page="users" href="users.html">Users</a>
        <a data-page="tickets" href="tickets.html">Tickets</a>
        <a data-page="wallets" href="wallets.html">Wallets</a>
        <a data-page="audit" href="audit.html">Audit</a>
        <a data-page="settings" href="settings.html">Settings</a>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="topbar-left"><input id="global-search" class="input search" placeholder="Search tickets..." /></div>
        <div class="topbar-right"><span id="admin-email" class="tag"></span><button id="logout-btn" class="btn btn-secondary">Logout</button></div>
      </div>
      <h1 id="page-title">Tickets</h1>

      <section class="card">
        <div class="grid two">
          <div><label>User ID</label><input id="f-user" class="input" /></div>
          <div><label>Ticket ID</label><input id="f-ticket" class="input" /></div>
          <div><label>Date From</label><input id="f-from-date" class="input" type="date" /></div>
          <div><label>Date To</label><input id="f-to-date" class="input" type="date" /></div>
          <div><label>Product</label><input id="f-product" class="input" /></div>
          <div><label>Status</label><select id="f-status"><option value="">All</option><option>PAID</option><option>REFUNDED</option><option>CANCELLED</option></select></div>
          <div><label>Route</label><input id="f-route" class="input" placeholder="Cape Town" /></div>
        </div>
        <div class="row-actions" style="margin-top:10px;">
          <button id="apply-filter" class="btn btn-primary">Apply Filters</button>
          <button id="exp-csv" class="btn btn-secondary">Export CSV</button>
          <button id="exp-xlsx" class="btn btn-secondary">Export XLSX</button>
          <button id="exp-pdf" class="btn btn-secondary">Export PDF</button>
        </div>
      </section>

      <section class="card" style="margin-top:14px;">
        <div class="table-wrap">
          <table>
            <thead><tr><th>ID</th><th>User</th><th>Product</th><th>Route</th><th>Journeys</th><th>Payment</th><th>Amount</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="ticket-body"></tbody>
          </table>
        </div>
      </section>

      <div id="ticket-modal" class="modal">
        <div class="modal-card">
          <div class="modal-head"><h3>Ticket Detail</h3><button id="close-ticket-modal" class="btn btn-secondary">Close</button></div>
          <div id="ticket-modal-content"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
  <script src="../admin-common/mc-app.js"></script>
  <script src="../admin-common/export.js"></script>
  <script>
    (async function () {
      MCAdmin.requireAuth();
      await MCAdmin.initRemote(false);
      MCAdmin.applyLayout('tickets', 'MyCiTi Tickets');

      let currentRows = [];
      const modal = document.getElementById('ticket-modal');
      const modalContent = document.getElementById('ticket-modal-content');
      document.getElementById('close-ticket-modal').onclick = function () { modal.classList.remove('open'); };

      function inRange(t, from, to) {
        const d = new Date(t.purchasedAt);
        if (Number.isNaN(d.getTime())) return false;
        if (from && d < new Date(from)) return false;
        if (to) {
          const toD = new Date(to);
          toD.setHours(23, 59, 59, 999);
          if (d > toD) return false;
        }
        return true;
      }

      function filtered() {
        const f = {
          user: document.getElementById('f-user').value.trim().toLowerCase(),
          ticket: document.getElementById('f-ticket').value.trim().toLowerCase(),
          from: document.getElementById('f-from-date').value,
          to: document.getElementById('f-to-date').value,
          product: document.getElementById('f-product').value.trim().toLowerCase(),
          status: document.getElementById('f-status').value,
          route: document.getElementById('f-route').value.trim().toLowerCase()
        };

        return MCAdmin.getTickets().filter((t) => {
          if (f.user && !String(t.userId).toLowerCase().includes(f.user)) return false;
          if (f.ticket && !String(t.id).toLowerCase().includes(f.ticket)) return false;
          if (f.product && !String(t.productName).toLowerCase().includes(f.product)) return false;
          if (f.status && t.status !== f.status) return false;
          if (f.route) {
            const route = `${t.routeFrom} ${t.routeTo}`.toLowerCase();
            if (!route.includes(f.route)) return false;
          }
          if ((f.from || f.to) && !inRange(t, f.from, f.to)) return false;
          return true;
        });
      }

      function openDetail(t) {
        const remaining = Math.max(0, (Number(t.journeysIncluded) || 0) - (Number(t.journeysUsed) || 0));
        modalContent.innerHTML = `
          <p><strong>Ticket ID:</strong> ${t.id}</p>
          <p><strong>User ID:</strong> ${t.userId}</p>
          <p><strong>Journeys:</strong> ${t.journeysIncluded} included / ${t.journeysUsed} used / ${remaining} remaining</p>
          <p><strong>Route:</strong> ${t.routeFrom} -> ${t.routeTo}</p>
          <p><strong>Payment:</strong> ${t.paymentMethod} ${t.cardAlias || ''}</p>
          <p><strong>Amount:</strong> ${MCAdmin.fmtCurrency(t.amount)}</p>
          <p><strong>Status:</strong> ${t.status}</p>
        `;
        modal.classList.add('open');
      }

      function refundTicket(ticketId) {
        const tickets = MCAdmin.getTickets();
        const idx = tickets.findIndex((x) => x.id === ticketId);
        if (idx < 0) return;
        if (tickets[idx].status === 'REFUNDED') return alert('Already refunded.');
        const before = { ...tickets[idx] };
        tickets[idx].status = 'REFUNDED';
        MCAdmin.saveTickets(tickets);

        if (before.paymentMethod === 'WALLET') {
          const wallets = MCAdmin.getWallets();
          const wIdx = wallets.findIndex((w) => w.userId === before.userId);
          if (wIdx >= 0) {
            wallets[wIdx].balance = Number(wallets[wIdx].balance || 0) + Number(before.amount || 0);
            wallets[wIdx].transactions.unshift({
              id: MCAdmin.uid('tx'),
              type: 'REFUND',
              amount: Number(before.amount || 0),
              at: MCAdmin.nowIso(),
              refTicketId: before.id,
              note: 'Admin refund from Tickets page'
            });
            MCAdmin.saveWallets(wallets);
          }
        }

        MCAdmin.logAudit('TICKET_REFUND', 'TICKET', before.id, before, tickets[idx]);
        render();
      }

      function render() {
        const body = document.getElementById('ticket-body');
        currentRows = filtered();
        body.innerHTML = '';
        currentRows.forEach((t) => {
          const remaining = Math.max(0, (Number(t.journeysIncluded) || 0) - (Number(t.journeysUsed) || 0));
          const tr = document.createElement('tr');
          tr.setAttribute('data-searchable', 'true');
          tr.innerHTML = `
            <td>${t.id}</td>
            <td>${t.userId}</td>
            <td>${t.productName}</td>
            <td>${t.routeFrom} -> ${t.routeTo}</td>
            <td>${t.journeysIncluded}/${t.journeysUsed}/${remaining}</td>
            <td>${t.paymentMethod} ${t.cardAlias || ''}</td>
            <td>${MCAdmin.fmtCurrency(t.amount)}</td>
            <td>${t.status}</td>
            <td>
              <div class="row-actions">
                <button class="btn btn-secondary" data-a="detail">Detail</button>
                <button class="btn btn-secondary" data-a="refund">Refund</button>
              </div>
            </td>
          `;
          tr.querySelector('[data-a="detail"]').onclick = function () { openDetail(t); };
          tr.querySelector('[data-a="refund"]').onclick = function () { refundTicket(t.id); };
          body.appendChild(tr);
        });
      }

      function exportRows() {
        return currentRows.map((t) => ({
          id: t.id,
          userId: t.userId,
          productName: t.productName,
          routeFrom: t.routeFrom,
          routeTo: t.routeTo,
          journeysIncluded: t.journeysIncluded,
          journeysUsed: t.journeysUsed,
          amount: t.amount,
          paymentMethod: t.paymentMethod,
          cardAlias: t.cardAlias,
          status: t.status,
          purchasedAt: t.purchasedAt
        }));
      }

      document.getElementById('apply-filter').onclick = render;
      document.getElementById('exp-csv').onclick = function () { GAExport.exportCsv('myciti-tickets.csv', exportRows()); MCAdmin.logAudit('EXPORT_TICKETS_CSV', 'TICKET', 'list', null, { rows: currentRows.length }); };
      document.getElementById('exp-xlsx').onclick = function () { GAExport.exportXlsx('myciti-tickets.xlsx', exportRows(), 'Tickets'); MCAdmin.logAudit('EXPORT_TICKETS_XLSX', 'TICKET', 'list', null, { rows: currentRows.length }); };
      document.getElementById('exp-pdf').onclick = function () {
        const body = currentRows.map((t) => [t.id, t.userId, t.productName, `${t.routeFrom} -> ${t.routeTo}`, MCAdmin.fmtCurrency(t.amount), t.status]);
        GAExport.exportPdfTable('myciti-tickets.pdf', ['ID', 'User', 'Product', 'Route', 'Amount', 'Status'], body, 'Ticket History');
        MCAdmin.logAudit('EXPORT_TICKETS_PDF', 'TICKET', 'list', null, { rows: currentRows.length });
      };

      render();
    })();
  </script>
</body>
</html>
