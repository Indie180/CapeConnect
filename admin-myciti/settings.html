<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyCiTi Admin - Settings</title>
  <link rel="stylesheet" href="../admin-common/mc-theme.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">MyCiTi <small>Admin Centre</small></div>
      <div class="demo-banner">Demo mode: localStorage only - not secure.</div>
      <div class="nav-list" style="margin-top:14px;">
        <a data-page="dashboard" href="dashboard.html">Dashboard</a>
        <a data-page="timetables" href="timetables.html">Timetables</a>
        <a data-page="prices" href="prices.html">Prices</a>
        <a data-page="users" href="users.html">Users</a>
        <a data-page="tickets" href="tickets.html">Tickets</a>
        <a data-page="wallets" href="wallets.html">Wallets</a>
        <a data-page="audit" href="audit.html">Audit</a>
        <a data-page="settings" href="settings.html">Settings</a>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="topbar-left"><input id="global-search" class="input search" placeholder="Search settings..." /></div>
        <div class="topbar-right"><span id="admin-email" class="tag"></span><button id="logout-btn" class="btn btn-secondary">Logout</button></div>
      </div>
      <h1 id="page-title">Settings</h1>

      <section class="card">
        <h3>Session / Credential Settings</h3>
        <div class="grid two">
          <div><label>Session Timeout (minutes)</label><input id="s-timeout" class="input" type="number" min="5" step="1" /></div>
          <div><label>Admin Email</label><input id="s-email" class="input" type="email" /></div>
          <div><label>Admin Password</label><input id="s-password" class="input" type="text" /></div>
          <div><label>Admin Access Phrase</label><input id="s-phrase" class="input" type="text" /></div>
        </div>
        <div class="row-actions" style="margin-top:10px;"><button id="save-settings" class="btn btn-primary">Save Settings</button></div>
      </section>

      <section class="card" style="margin-top:14px;">
        <h3>Backup / Restore</h3>
        <div class="row-actions">
          <button id="export-backup" class="btn btn-secondary">Export Full JSON Backup</button>
          <input id="import-backup-file" class="input" type="file" accept="application/json" style="max-width:360px;" />
          <button id="import-backup" class="btn btn-primary">Import Backup JSON</button>
        </div>
        <p class="notice" style="margin-top:8px;">Import will overwrite current localStorage admin datasets.</p>
      </section>

      <div id="status" class="success"></div>
      <div id="error" class="error"></div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
  <script src="../admin-common/mc-app.js"></script>
  <script src="../admin-common/export.js"></script>
  <script>
    (async function () {
      MCAdmin.requireAuth();
      await MCAdmin.initRemote(false);
      MCAdmin.applyLayout('settings', 'MyCiTi Settings');

      const status = document.getElementById('status');
      const error = document.getElementById('error');
      function showOk(msg) { status.textContent = msg; status.style.display = 'block'; error.style.display = 'none'; }
      function showErr(msg) { error.textContent = msg; error.style.display = 'block'; status.style.display = 'none'; }

      function fill() {
        const s = MCAdmin.getSettings();
        document.getElementById('s-timeout').value = s.sessionMinutes;
        document.getElementById('s-email').value = s.email;
        document.getElementById('s-password').value = s.password;
        document.getElementById('s-phrase').value = s.phrase;
      }

      document.getElementById('save-settings').onclick = function () {
        const next = {
          sessionMinutes: Number(document.getElementById('s-timeout').value || 30),
          email: document.getElementById('s-email').value.trim(),
          password: document.getElementById('s-password').value,
          phrase: document.getElementById('s-phrase').value.trim()
        };
        if (!next.email || !next.password || !next.phrase || !Number.isFinite(next.sessionMinutes) || next.sessionMinutes < 5) {
          return showErr('Please enter valid settings.');
        }
        const before = MCAdmin.getSettings();
        MCAdmin.saveSettings(next);
        MCAdmin.logAudit('SETTINGS_UPDATE', 'SETTINGS', 'MC_ADMIN_SETTINGS', before, next);
        showOk('Settings saved.');
      };

      document.getElementById('export-backup').onclick = function () {
        const data = {
          MC_USERS: MCAdmin.getUsers(),
          MC_TICKETS: MCAdmin.getTickets(),
          MC_WALLETS: MCAdmin.getWallets(),
          MC_TIMETABLES: MCAdmin.getTimetables(),
          MC_PRICES_GLOBAL: MCAdmin.getPricesGlobal(),
          MC_PRICES_ROUTES: MCAdmin.getPricesRoutes(),
          MC_AUDIT_LOGS: MCAdmin.getAudit(),
          MC_ADMIN_SETTINGS: MCAdmin.getSettings(),
          exportedAt: MCAdmin.nowIso()
        };
        GAExport.exportJson(`myciti-backup-${Date.now()}.json`, data);
        const backups = MCAdmin.read(MCAdmin.KEYS.backups, []);
        backups.unshift({ id: MCAdmin.uid('backup'), at: MCAdmin.nowIso(), size: JSON.stringify(data).length });
        MCAdmin.write(MCAdmin.KEYS.backups, backups.slice(0, 20));
        MCAdmin.logAudit('BACKUP_EXPORT', 'BACKUP', 'all', null, { bytes: JSON.stringify(data).length });
      };

      document.getElementById('import-backup').onclick = function () {
        const file = document.getElementById('import-backup-file').files[0];
        if (!file) return showErr('Select a backup JSON file first.');
        const reader = new FileReader();
        reader.onload = function () {
          try {
            const data = JSON.parse(String(reader.result || '{}'));
            const before = { importedAt: MCAdmin.nowIso() };
            if (!data.MC_USERS || !data.MC_TICKETS) throw new Error('Invalid backup shape.');

            MCAdmin.saveUsers(data.MC_USERS || []);
            MCAdmin.saveTickets(data.MC_TICKETS || []);
            MCAdmin.saveWallets(data.MC_WALLETS || []);
            MCAdmin.saveTimetables(data.MC_TIMETABLES || []);
            MCAdmin.savePricesGlobal(data.MC_PRICES_GLOBAL || []);
            MCAdmin.savePricesRoutes(data.MC_PRICES_ROUTES || []);
            MCAdmin.saveAudit(data.MC_AUDIT_LOGS || []);
            MCAdmin.saveSettings(data.MC_ADMIN_SETTINGS || MCAdmin.getSettings());
            MCAdmin.logAudit('BACKUP_IMPORT', 'BACKUP', 'all', before, { importedAt: MCAdmin.nowIso() });
            showOk('Backup imported successfully.');
            fill();
          } catch (e) {
            showErr(`Import failed: ${e.message}`);
          }
        };
        reader.readAsText(file);
      };

      fill();
    })();
  </script>
</body>
</html>
