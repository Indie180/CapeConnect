<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
  <p>Redirecting to dashboard...</p>
  <script>
    const target = "golden-arrow-dashboard.html";
    window.location.replace(target);

</html>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="pictures/ChatGPT Image Feb 5, 2026, 10_08_28 AM.png">
  <title>Golden Arrow Journey Calculator</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    :root{
      --bg:var(--bg-main);
      --card:var(--bg-card);
      --text:var(--text-main);
      --muted:var(--text-muted);
      --line:var(--border-input);
      --accent:var(--brand-primary);
      --accent-dark:#b45309;
    }
    body{
      font-family:system-ui,Arial,sans-serif;
      margin:0;
      max-width:none;
      background:radial-gradient(900px 500px at 10% 0%, rgba(245,200,76,.18), transparent 55%), var(--bg);
      color:var(--text);
    }
    .page-wrap{max-width:820px;margin:24px auto;padding:0 18px;}
    .card{
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px;
      background:var(--card);
      box-shadow:var(--shadow);
    }
    label{display:block;margin:10px 0 6px;font-weight:800}
    select,input,button{
      width:100%;
      padding:10px;
      border:1px solid var(--line);
      border-radius:10px;
      background:var(--bg-input);
      color:var(--text);
      outline:none;
    }
    button{
      background:var(--brand-primary);
      border-color:var(--brand-primary);
      font-weight:900;
      cursor:pointer;
    }
    button:hover{filter:brightness(0.98)}
    .row{display:grid;grid-template-columns:1fr;gap:10px}
    @media(min-width:700px){.row{grid-template-columns:1fr 1fr}}
    .result{
      margin-top:12px;
      background:var(--bg-input);
      border-radius:12px;
      padding:12px;
      border:1px solid var(--line);
    }
    .error{
      border:1px solid #fecaca;
      background:#fff1f2;
      color:#7f1d1d;
    }
    .mono{font-family:ui-monospace,Menlo,monospace}
    small{color:var(--muted)}
  </style>
</head>
<body class="bus-ga">
  <header>
    <div class="nav-container">
    <a href="golden-arrow-dashboard.html" class="logo">
        <img class="logo-img" src="pictures/Golden_Arrow-removebg-preview.png" alt="Golden Arrow">
        <span class="logo-text">CapeConnect</span>
      </a>
      <nav class="nav-links" id="main-nav">
        <a href="golden-arrow-dashboard.html" data-link="dashboard">Dashboard</a>
        <a href="golden-arrow-timetable.html" data-link="timetable">Timetable & Routes</a>
        <a href="ga-calculator.html" data-link="calculator">Calculator</a>
        <a href="ga-route-calculator.html" data-link="booking">Book Ticket</a>
      </nav>
    </div>
  </header>

  <div class="page-wrap">
  <h2>Golden Arrow Journey Calculator (Demo)</h2>
  <small>Golden Arrow is journey-based: 1 journey = 1 ride.</small>

  <div class="card">
    <div class="row">
      <div>
        <label for="from">From</label>
        <select id="from"></select>
      </div>
      <div>
        <label for="to">To</label>
        <select id="to"></select>
      </div>
    </div>

    <label for="product">Ticket product</label>
    <select id="product">
      <option value="five">5 Ride (5 journeys)</option>
      <option value="weekly">Weekly (10 journeys)</option>
      <option value="monthly">Monthly (48 journeys)</option>
    </select>

    <div class="row">
      <div>
        <label for="plannedTrips">Planned trips (rides)</label>
        <input id="plannedTrips" type="number" min="1" step="1" value="10" />
      </div>
      <div>
        <label for="qty">Quantity</label>
        <input id="qty" type="number" min="1" step="1" value="1" />
      </div>
    </div>

    <button id="calc">Calculate</button>

    <div class="result" id="out" role="status" aria-live="polite">Select From/To, then calculate.</div>
  </div>
  </div>

<script src="js/api-client.js"></script>
<script src="js/auth-pages.js"></script>
<script src="js/cc-utils.js"></script>
<script src="js/cc-validation.js"></script>
<script src="js/data-service.js"></script>
<script>
  const FALLBACK_DATA = {
    products: {
      five: { label: "5 Ride (5 journeys)", journeysIncluded: 5 },
      weekly: { label: "Weekly (10 journeys)", journeysIncluded: 10 },
      monthly: { label: "Monthly (48 journeys)", journeysIncluded: 48 }
    },
    routePairs: [
      { from: "Cape Town", to: "Khayelitsha", faresCents: { five: 12650, weekly: 23400, monthly: 103000 } },
      { from: "Langa", to: "Cape Town", faresCents: { five: 11450, weekly: 21200, monthly: 93300 } },
      { from: "Somerset West", to: "Cape Town", faresCents: { five: 14750, weekly: 27350, monthly: 120300 } }
    ]
  };
  let PRODUCTS = FALLBACK_DATA.products;
  let ROUTE_PAIRS = FALLBACK_DATA.routePairs;
  let FARES = {};
  let INCLUDED = { five: 5, weekly: 10, monthly: 48 };
  let VALID_FROM = [];
  let VALID_TO = [];

  const $ = (id) => document.getElementById(id);
  const out = $("out");

  function buildFareMaps(){
    FARES = {};
    INCLUDED = {};
    Object.keys(PRODUCTS).forEach(k => {
      INCLUDED[k] = Number(PRODUCTS[k].journeysIncluded || 0);
    });
    ROUTE_PAIRS.forEach(p => {
      const row = {};
      Object.keys(p.faresCents || {}).forEach(k => {
        row[k] = Number(p.faresCents[k] || 0) / 100;
      });
      FARES[`${p.from}→${p.to}`] = row;
    });
    VALID_FROM = [...new Set(ROUTE_PAIRS.map(p => p.from))];
    VALID_TO = [...new Set(ROUTE_PAIRS.map(p => p.to))];
  }

  function renderRouteOptions(){
    $("from").innerHTML = VALID_FROM.map(name => `<option>${name}</option>`).join("");
    $("to").innerHTML = VALID_TO.map(name => `<option>${name}</option>`).join("");
  }

  async function loadGaData(){
    try {
      const data = window.CCDataService && typeof window.CCDataService.loadGoldenArrowWithMeta === "function"
        ? await window.CCDataService.loadGoldenArrowWithMeta()
        : null;
      if (data && data.products && typeof data.products === "object") PRODUCTS = data.products;
      if (data && Array.isArray(data.routePairs) && data.routePairs.length) ROUTE_PAIRS = data.routePairs;
    } catch (err) {
      console.warn("Using fallback Golden Arrow dataset:", err.message);
    }
    buildFareMaps();
    renderRouteOptions();
  }

  function key(){ return `${$("from").value}→${$("to").value}`; }
  function money(n){ return window.CCUtils.formatZarFromCents(Math.round(Number(n || 0) * 100)); }
  function label(p){
    return PRODUCTS[p]?.label || p;
  }

  $("calc").addEventListener("click", () => {
    const k = key();
    const product = $("product").value;
    const plannedRaw = Number($("plannedTrips").value || 1);
    const qtyRaw = Number($("qty").value || 1);
    const planned = window.CCValidation.intFromInput($("plannedTrips"), 1, 1);
    const qty = window.CCValidation.intFromInput($("qty"), 1, 1);

    const qtyCheck = window.CCValidation.validateWholeNumber(qtyRaw, 1, "Quantity");
    if (!qtyCheck.ok) {
      out.innerHTML = `<div class="error">${qtyCheck.msg}</div>`;
      return;
    }
    const plannedCheck = window.CCValidation.validateWholeNumber(plannedRaw, 1, "Planned trips");
    if (!plannedCheck.ok) {
      out.innerHTML = `<div class="error">${plannedCheck.msg}</div>`;
      return;
    }
    if (!(product in PRODUCTS)) {
      out.innerHTML = `<div class="error">Select a valid ticket product.</div>`;
      return;
    }

    const row = FARES[k];
    if(!row){
      out.innerHTML = `<div class="error"><b>Route not in dataset.</b><br>
      Please choose one of these pairs:<br>
      ${ROUTE_PAIRS.map(p => `- ${p.from} → ${p.to}`).join("<br>")}</div>`;
      return;
    }

    const included = INCLUDED[product];
    const price = row[product];
    const totalPrice = price * qty;

    const journeysLeft = (included * qty) - planned;

    out.innerHTML = `
      <b>Trip:</b> ${k.replace("→"," → ")}<br>
      <b>Ticket:</b> ${label(product)}<br>
      <b>Journeys included:</b> ${included} (per ticket)<br>
      <b>Quantity:</b> ${qty}<br>
      <b>Total journeys:</b> ${included * qty}<br>
      <hr style="border:none;border-top:1px solid #e5e7eb;margin:10px 0;">
      <b>Price (per ticket):</b> <span class="mono">${money(price)}</span><br>
      <b>Total price:</b> <span class="mono">${money(totalPrice)}</span><br>
      <b>Planned trips:</b> ${planned}<br>
      <b>Journeys left after plan:</b> <span class="mono">${journeysLeft}</span><br>
      <small>${journeysLeft < 0 ? "You will run out of journeys. Buy more quantity or choose a bigger product." : "You have enough journeys for your plan."}</small>
    `;
  });

  loadGaData();
</script>
<script src="js/app.js"></script>
<script>
  (function(){
    if (window.App) {
      App.loadTheme();
      App.applyBusTheme();
    }
    const path = location.pathname.split('/').pop();
    document.querySelectorAll('#main-nav a').forEach(a => {
      const href = a.getAttribute('href');
      if (href === path) a.classList.add('active');
    });
  })();
</script>
</body>
</html>
