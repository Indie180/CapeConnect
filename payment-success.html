<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - CapeConnect</title>
    <link rel="stylesheet" href="css/mobile-responsive.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .success-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            text-align: center;
            background: linear-gradient(135deg, #e8f5e8, #f1f8e9);
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: #4caf50;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
            animation: successPulse 2s ease-in-out infinite;
        }

        .success-icon::before {
            content: '✓';
            color: white;
            font-size: 2.5rem;
            font-weight: bold;
        }

        @keyframes successPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .success-title {
            font-size: 2rem;
            font-weight: 700;
            color: #2e7d32;
            margin-bottom: 1rem;
        }

        .success-message {
            font-size: 1.125rem;
            color: #666;
            margin-bottom: 2rem;
            max-width: 400px;
        }

        .payment-details {
            background: white;
            padding: 1.5rem;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
            max-width: 400px;
            width: 100%;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            font-weight: 600;
            color: #333;
        }

        .detail-value {
            color: #666;
        }

        .amount-value {
            font-size: 1.25rem;
            font-weight: 700;
            color: #4caf50;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
            max-width: 400px;
        }

        .btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-primary {
            background: #1976d2;
            color: white;
        }

        .btn-primary:hover {
            background: #1565c0;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
            border: 1px solid #ddd;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #1976d2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .processing-message {
            color: #666;
            font-style: italic;
            margin-bottom: 1rem;
        }

        @media (max-width: 480px) {
            .success-container {
                padding: 1rem;
            }

            .success-title {
                font-size: 1.5rem;
            }

            .success-message {
                font-size: 1rem;
            }

            .action-buttons {
                gap: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-icon"></div>
        
        <h1 class="success-title">Payment Successful!</h1>
        
        <p class="success-message">
            Your wallet has been topped up successfully. You can now use your balance to purchase tickets.
        </p>

        <div class="payment-details" id="payment-details">
            <div class="processing-message" id="processing-message">
                <span class="loading-spinner"></span>
                Processing your payment...
            </div>
        </div>

        <div class="action-buttons">
            <a href="profile.html" class="btn btn-primary" id="wallet-btn" style="display: none;">
                View My Wallet
            </a>
            <a href="dashboard.html" class="btn btn-secondary" id="dashboard-btn" style="display: none;">
                Back to Dashboard
            </a>
        </div>
    </div>

    <script type="module">
        import { payFastService } from './js/payfast-service.js';
        import { walletService } from './js/wallet-service.js';

        class PaymentSuccessPage {
            constructor() {
                this.paymentData = null;
                this.init();
            }

            async init() {
                // Get payment data from URL parameters
                const urlParams = new URLSearchParams(window.location.search);
                const paymentId = urlParams.get('payment_id') || urlParams.get('m_payment_id');
                
                if (paymentId) {
                    await this.processPaymentCompletion(paymentId);
                } else {
                    this.showError('No payment information found');
                }
            }

            async processPaymentCompletion(paymentId) {
                try {
                    // Extract PayFast data from URL
                    const urlParams = new URLSearchParams(window.location.search);
                    const paymentData = {
                        payment_status: urlParams.get('payment_status'),
                        pf_payment_id: urlParams.get('pf_payment_id'),
                        payment_id: paymentId,
                        amount_gross: urlParams.get('amount_gross'),
                        amount_fee: urlParams.get('amount_fee'),
                        amount_net: urlParams.get('amount_net')
                    };

                    // Complete payment with PayFast service
                    const result = await payFastService.handlePaymentCompletion('success', paymentData);
                    
                    if (result.success) {
                        this.paymentData = result.payment;
                        this.displayPaymentDetails();
                        
                        // Refresh wallet data
                        await walletService.getWallet();
                        
                        // Show success buttons
                        this.showActionButtons();
                    } else {
                        this.showError(result.error || 'Failed to process payment');
                    }
                } catch (error) {
                    console.error('Payment processing error:', error);
                    this.showError('An error occurred while processing your payment');
                }
            }

            displayPaymentDetails() {
                const detailsContainer = document.getElementById('payment-details');
                
                if (!this.paymentData) {
                    detailsContainer.innerHTML = '<p>Payment details not available</p>';
                    return;
                }

                const amount = this.paymentData.amount_cents ? 
                    `R ${(this.paymentData.amount_cents / 100).toFixed(2)}` : 
                    'N/A';

                const date = new Date().toLocaleDateString('en-ZA', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                detailsContainer.innerHTML = `
                    <div class="detail-row">
                        <span class="detail-label">Amount</span>
                        <span class="detail-value amount-value">${amount}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Date</span>
                        <span class="detail-value">${date}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Payment ID</span>
                        <span class="detail-value">${this.paymentData.paymentId || 'N/A'}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Status</span>
                        <span class="detail-value" style="color: #4caf50; font-weight: 600;">Completed</span>
                    </div>
                `;
            }

            showActionButtons() {
                document.getElementById('processing-message').style.display = 'none';
                document.getElementById('wallet-btn').style.display = 'inline-block';
                document.getElementById('dashboard-btn').style.display = 'inline-block';
            }

            showError(message) {
                const detailsContainer = document.getElementById('payment-details');
                detailsContainer.innerHTML = `
                    <div style="color: #f44336; text-align: center; padding: 1rem;">
                        <strong>Error:</strong> ${message}
                    </div>
                `;
                
                // Show dashboard button only
                document.getElementById('processing-message').style.display = 'none';
                document.getElementById('dashboard-btn').style.display = 'inline-block';
            }
        }

        // Initialize payment success page
        new PaymentSuccessPage();
    </script>
</body>
</html>
